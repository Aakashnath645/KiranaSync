name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Configure Environment Variables
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: Regenerate Gradle Wrapper
        run: |
          # Rebuild the wrapper jar to prevent any git-corruption or line-ending translation issues
          gradle wrapper
          sed -i -e 's/\r$//' gradlew
          chmod +x gradlew

      - name: Decode Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Check for Release Keystore and Build Release
        id: build_release
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ] && [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > my-upload-key.jks
            export KEYSTORE_PATH=my-upload-key.jks
            ./gradlew assembleRelease
            echo "has_release=true" >> $GITHUB_OUTPUT
          else
            echo "Release secrets are not configured. Skipping release signed APK build."
            echo "has_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare Artifacts
        run: |
          mkdir -p build-artifacts
          # Copy debug APK if it exists
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk build-artifacts/KiranaSync-debug.apk
          fi
          # Copy release APK if it was built
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk build-artifacts/KiranaSync-release.apk
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk build-artifacts/KiranaSync-release-unsigned.apk
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packaged-apks
          path: build-artifacts/
          if-no-files-found: error

      - name: Determine Tag Name
        id: tag_identifier
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            TAG_NAME="v1.0.${{ github.run_number }}"
          fi
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_identifier.outputs.tag }}
          name: "KiranaSync Release ${{ steps.tag_identifier.outputs.tag }}"
          files: |
            build-artifacts/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
